services:
  ros2_polymetis:
    build:
      context: ../../../../
      dockerfile: ros2_ws/src/role-ros2/docker/Dockerfile.ros2_polymetis
      args:
        LIBFRANKA_VERSION: "0.14.1"
        ROBOT_TYPE: "fr3"
        ROBOT_IP: "172.17.0.2"
        NUC_IP: "172.17.0.1"
    network_mode: host
    # Enable privileged mode for hardware access (required for real-time and /dev/cpu_dma_latency)
    # If you don't need real-time, you can remove this and run servers on host instead
    privileged: true
    # Mount all devices (required for /dev/cpu_dma_latency access)
    # This is critical for real-time operations in Docker
    devices:
      - "/dev:/dev"
    # Add real-time scheduling capability (required for SYS_NICE)
    cap_add:
      - SYS_NICE      # Real-time scheduling
    # Set real-time priority and memory locking limits (required for mlockall)
    # These limits allow the container to use real-time features
    ulimits:
      rtprio: 99          # Real-time priority limit (0-99)
      memlock: 102400     # Memory locking limit in KB (100MB)
    # Auto-restart policy (matches official NUC configuration)
    deploy:
      restart_policy:
        condition: any
    environment:
      ROBOT_IP: "172.17.0.2"
      POLYMETIS_IP: "127.0.0.1"
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: "rmw_cyclonedds_cpp"
      ROS_LOCALHOST_ONLY: "0"
      DISPLAY: "${DISPLAY}"
      # Set SKIP_AUTO_ENV=true to skip automatic environment configuration
      # Then manually source: source /app/ros2_ws/src/role-ros2/docker/polymetis_ros2.env
      SKIP_AUTO_ENV: "${SKIP_AUTO_ENV:-false}"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # ========== 开发模式：挂载所有源代码（除了 fairo 和 oculus_reader）==========
      # 根目录文件
      - ../CMakeLists.txt:/app/ros2_ws/src/role-ros2/CMakeLists.txt:rw
      - ../package.xml:/app/ros2_ws/src/role-ros2/package.xml:rw
      # 挂载顶层目录
      - ../scripts:/app/ros2_ws/src/role-ros2/scripts:rw
      - ../launch:/app/ros2_ws/src/role-ros2/launch:rw
      - ../config:/app/ros2_ws/src/role-ros2/config:rw
      - ../msg:/app/ros2_ws/src/role-ros2/msg:rw
      - ../srv:/app/ros2_ws/src/role-ros2/srv:rw
      - ../franka_hw_config:/app/ros2_ws/src/role-ros2/franka_hw_config:rw
      # 挂载 role_ros2 目录（选择性挂载子目录，排除 fairo 和 oculus_reader）
      - ../role_ros2/__init__.py:/app/ros2_ws/src/role-ros2/role_ros2/__init__.py:rw
      - ../role_ros2/setup.py:/app/ros2_ws/src/role-ros2/role_ros2/setup.py:rw
      - ../role_ros2/pyproject.toml:/app/ros2_ws/src/role-ros2/role_ros2/pyproject.toml:rw
      - ../role_ros2/robot_env.py:/app/ros2_ws/src/role-ros2/role_ros2/robot_env.py:rw
      - ../role_ros2/calibration:/app/ros2_ws/src/role-ros2/role_ros2/calibration:rw
      - ../role_ros2/camera_utils:/app/ros2_ws/src/role-ros2/role_ros2/camera_utils:rw
      - ../role_ros2/franka:/app/ros2_ws/src/role-ros2/role_ros2/franka:rw
      - ../role_ros2/misc:/app/ros2_ws/src/role-ros2/role_ros2/misc:rw
      - ../role_ros2/robot_ik:/app/ros2_ws/src/role-ros2/role_ros2/robot_ik:rw
      # 注意：不挂载 role_ros2/fairo/ - 保留 Docker 中编译的 Polymetis
      # 注意：不挂载 role_ros2/oculus_reader/ - 保留 Docker 中的版本
