services:
  ros2_cu118:
    image: ros2_cu118:latest
    container_name: ros2_cu118_container
    build:
      context: ../..  # From ros2_cu118 directory, go up 2 levels to role-ros2 root
      dockerfile: docker/ros2_cu118/Dockerfile.ros2_cu118
      args:
        ZED_SDK_MAJOR: "4"
        ZED_SDK_MINOR: "1"
        ZED_ROS2_WRAPPER_VERSION: "humble-v4.1.4"
    # Use host network mode for ROS2 communication
    network_mode: host
    # Use host PID namespace for correct daemon PID detection
    pid: host
    # Use host IPC namespace for DDS zero-copy and shared memory
    ipc: host
    # Keep container running (required for background mode)
    stdin_open: true
    tty: true
    # Enable privileged mode for hardware access (USB devices, video devices, etc.)
    privileged: true
    # Enable NVIDIA GPU support (required for CUDA and ZED camera)
    # Use runtime: nvidia for compatibility with older docker-compose versions
    # Alternative: Use deploy.resources.reservations.devices for docker-compose v2.3+
    # Note: Requires nvidia-container-toolkit to be installed on the host
    # If you get "could not select device driver nvidia" error, either:
    # 1. Install nvidia-container-toolkit (see NVIDIA_GPU_SETUP.md)
    # 2. Use docker-compose-no-gpu.yaml instead (ZED camera will not work)
    runtime: nvidia
    # Auto-restart policy
    deploy:
      restart_policy:
        condition: any
    # Environment variables
    environment:
      # NVIDIA GPU environment variables
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,video,utility}"
      # ROS2 environment variables
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTDDS_BUILTIN_TRANSPORTS: "UDPv4"
      ROS_LOCALHOST_ONLY: "${ROS_LOCALHOST_ONLY:-0}"
      DISPLAY: "${DISPLAY}"
      # ZED SDK environment variables
      ZED_SDK_ROOT: "/usr/local/zed"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Shared memory for DDS (optional but recommended for FastDDS)
      - /dev/shm:/dev/shm:rw
      # Note: USB and video devices are accessible via privileged: true
      # No need to explicitly mount /dev/bus/usb or /dev/video* when privileged mode is enabled
      # Development mode: Mount role-ros2 source code directory
      # This allows editing code outside the container and building inside
      # Path: from ros2_cu118 directory, ../../ points to role-ros2 directory (up 2 levels)
      - ../../:/app/ros2_ws/src/role-ros2:rw
