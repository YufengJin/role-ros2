services:
  ros2_polymetis:
    build:
      context: ../../../../
      dockerfile: ros2_ws/src/role-ros2/docker/Dockerfile.ros2_polymetis
      args:
        LIBFRANKA_VERSION: "0.14.1"
        ROBOT_TYPE: "fr3"
        ROBOT_IP: "172.17.0.2"
        NUC_IP: "172.17.0.1"
    network_mode: host
    environment:
      ROBOT_IP: "172.17.0.2"
      POLYMETIS_IP: "127.0.0.1"
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: "rmw_cyclonedds_cpp"
      ROS_LOCALHOST_ONLY: "0"
      DISPLAY: "${DISPLAY}"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # ========== 开发模式：选择性挂载 ==========
      # 挂载 scripts 目录（主要开发区域）
      - ../scripts:/app/ros2_ws/src/role-ros2/scripts:rw
      # 挂载 launch 目录
      - ../launch:/app/ros2_ws/src/role-ros2/launch:rw
      # 挂载 config 目录
      - ../config:/app/ros2_ws/src/role-ros2/config:rw
      # 挂载 msg 目录（修改后需重新 colcon build）
      - ../msg:/app/ros2_ws/src/role-ros2/msg:rw
      # 挂载 franka_hw_config 目录
      - ../franka_hw_config:/app/ros2_ws/src/role-ros2/franka_hw_config:rw
      # 注意：不挂载 role_ros2/fairo/ - 保留 Docker 中编译的 Polymetis
