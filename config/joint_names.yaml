# Joint Names Configuration
# This file defines joint names that match the URDF
# Joint names are automatically extracted from URDF, but can be overridden here

# Arm ID prefix
arm_id: "fr3"

# Arm joint names (7 DOF)
# These should match the URDF joint names exactly
# Format: {arm_id}_panda_joint{1-7}
arm_joints:
  - "fr3_panda_joint1"
  - "fr3_panda_joint2"
  - "fr3_panda_joint3"
  - "fr3_panda_joint4"
  - "fr3_panda_joint5"
  - "fr3_panda_joint6"
  - "fr3_panda_joint7"

# Gripper joint names (2 finger joints)
gripper_joints:
  - "fr3_finger_joint1"
  - "fr3_finger_joint2"

# Note: If auto_extract_from_urdf is true, joint names will be extracted from URDF
# and the above lists will be ignored
auto_extract_from_urdf: true

