# VR Policy Node Configuration File
# This file contains default parameters for vr_policy_node
# You can override these values via launch arguments when starting the node

# ============================================================================
# Controller Selection
# ============================================================================

right_controller: true  # Use right controller (true) or left controller (false)

# ============================================================================
# Publishing Settings
# ============================================================================

publish_rate: 15.0  # Action publishing rate in Hz (default: 15.0)

# ============================================================================
# Velocity Limits
# ============================================================================

max_lin_vel: 1.0   # Maximum linear velocity (m/s)
max_rot_vel: 1.0   # Maximum rotational velocity (rad/s)
max_gripper_vel: 1.0  # Maximum gripper velocity (normalized)

# ============================================================================
# Control Gains
# ============================================================================

spatial_coeff: 1.0        # Spatial coefficient for VR position scaling
pos_action_gain: 5.0      # Position action gain (controls position sensitivity)
                          # Higher value = more sensitive (robot moves faster)
                          # Lower value = less sensitive (robot moves slower)
rot_action_gain: 2.0      # Rotation action gain (controls rotation sensitivity)
                          # Higher value = more sensitive rotation
                          # Lower value = less sensitive rotation
gripper_action_gain: 3.0  # Gripper action gain (controls gripper sensitivity)
                          # Higher value = faster gripper response

# ============================================================================
# Coordinate Transformation
# ============================================================================

# rmat_reorder: [x_idx, y_idx, z_idx, w_idx] where:
#   - Negative values indicate negative direction
#   - 1-4 indicate axis indices (1=x, 2=y, 3=z, 4=w)
#   - Example: [-2, -1, -3, 4] maps VR axes to robot axes
#   - This matrix reorders and flips axes to align VR coordinate system with robot
rmat_reorder: [-2, -1, -3, 4]

# ============================================================================
# Topic Names (optional, usually keep defaults)
# ============================================================================

oculus_right_pose_topic: "oculus/right_controller/pose"
oculus_left_pose_topic: "oculus/left_controller/pose"
oculus_buttons_topic: "oculus/buttons"
robot_state_topic: "polymetis/robot_state"
action_topic: "vr_policy/action"

# ============================================================================
# Example Configurations
# ============================================================================

# Configuration 1: Default (right controller, standard sensitivity)
# right_controller: true
# pos_action_gain: 5.0
# rot_action_gain: 2.0
# publish_rate: 15.0

# Configuration 2: Left controller with higher sensitivity
# right_controller: false
# pos_action_gain: 7.0  # Higher sensitivity
# rot_action_gain: 3.0
# publish_rate: 20.0

# Configuration 3: Slower, more precise control
# right_controller: true
# pos_action_gain: 3.0  # Lower sensitivity for precise control
# rot_action_gain: 1.5
# max_lin_vel: 0.5      # Lower max velocity
# max_rot_vel: 0.5
# publish_rate: 10.0

# Configuration 4: Fast, responsive control
# right_controller: true
# pos_action_gain: 8.0  # Higher sensitivity
# rot_action_gain: 4.0
# max_lin_vel: 1.5      # Higher max velocity
# max_rot_vel: 1.5
# publish_rate: 20.0

