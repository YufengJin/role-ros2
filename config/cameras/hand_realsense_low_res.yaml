# RealSense Camera Configuration - Hand Camera - LOW RESOLUTION MODE (for Robot Learning)
# This configuration is optimized for robot learning tasks
# - Low resolution: VGA (640x480) at 30Hz
# - Suitable for real-time learning tasks with reduced bandwidth
# - Point cloud and depth alignment enabled
#
# Frame ID Prefix:
#   The 'name' field is used as the camera_name parameter for RealSense nodes.
#   Frame IDs will be: {name}_color_optical_frame, {name}_depth_optical_frame, etc.
#
# Usage: ros2 launch role_ros2 realsense_camera.launch.py config_file:=hand_realsense_low_res.yaml

# Hand Camera (mounted on gripper) - RealSense D435i
# Camera Serial Number: 336222076118
# Configuration: LOW RESOLUTION (640x480) at 30Hz for robot learning
name: 'hand_camera'  # [REQUIRED] Camera name used for frame_id prefix
serial_number: '336222076118'  # [REQUIRED] Camera serial number (string, e.g., '123456789012')
namespace: 'realsense_node'  # [REQUIRED] ROS 2 topic namespace

# Stream settings - LOW RESOLUTION for learning
enable_color: true  # [REQUIRED] Enable RGB color stream
enable_depth: true  # [REQUIRED] Enable depth stream
enable_infra: false  # [DISABLED] Infrared stream 0
enable_infra1: false  # [DISABLED] Infrared stream 1
enable_infra2: false  # [DISABLED] Infrared stream 2

# RGB camera settings - VGA resolution
# NOTE: If using USB 2.1 port, consider reducing to 15Hz to avoid bandwidth issues
rgb_camera:
  color_profile: '640x480x30'  # [REQUIRED] RGB stream profile: widthxheightxfps (use 'x' separator)
  # Alternative for USB 2.1: '640x480x15' (reduces bandwidth requirement)
  color_format: 'RGB8'  # [REQUIRED] RGB format
  enable_auto_exposure: true  # [OPTIONAL] Auto exposure

# Depth module settings - VGA resolution
# NOTE: If using USB 2.1 port, consider reducing to 15Hz to avoid bandwidth issues
depth_module:
  depth_profile: '640x480x30'  # [REQUIRED] Depth stream profile: widthxheightxfps (use 'x' separator)
  # Alternative for USB 2.1: '640x480x15' (reduces bandwidth requirement)
  depth_format: 'Z16'  # [REQUIRED] Depth format
  enable_auto_exposure: true  # [OPTIONAL] Auto exposure for depth

# Point cloud settings - ENABLED
pointcloud:
  enable: true  # [ENABLED] Point cloud publishing
  stream_filter: 2  # [REQUIRED] Texture stream for pointcloud (2=color)
  stream_index_filter: 0  # [REQUIRED] Texture stream index
  ordered_pc: false  # [OPTIONAL] Ordered point cloud
  allow_no_texture_points: false  # [OPTIONAL] Allow points without texture

# Depth alignment - ENABLED (align depth to RGB)
align_depth:
  enable: true  # [ENABLED] Align depth to color frame

# TF settings - ENABLED
publish_tf: true  # [ENABLED] TF publishing enabled
tf_publish_rate: 0.0  # [STATIC] 0.0 = static TF only (no dynamic TF)
base_frame_id: 'link'  # [REQUIRED] Base frame ID suffix (results in: hand_camera_link)
tf_prefix: ''  # [OPTIONAL] TF prefix (empty = no prefix)

# Sensor settings - ALL DISABLED
enable_gyro: false  # [DISABLED] Gyro stream
enable_accel: false  # [DISABLED] Accelerometer stream
enable_motion: false  # [DISABLED] IMU motion stream
gyro_fps: 0  # [UNUSED] Not used when disabled
accel_fps: 0  # [UNUSED] Not used when disabled
unite_imu_method: 0  # [UNUSED] Not used when disabled

# Other settings
enable_sync: false  # [DISABLED] Hardware sync mode
enable_rgbd: false  # [DISABLED] RGBD topic
clip_distance: -2.0  # [OPTIONAL] Clip distance in meters (-2.0 = disabled)
diagnostics_period: 0.0  # [DISABLED] Diagnostics publishing rate (0=disabled)

# Filters - ALL DISABLED for performance
decimation_filter:
  enable: false
  filter_magnitude: 2
spatial_filter:
  enable: false
temporal_filter:
  enable: false
disparity_filter:
  enable: false
hole_filling_filter:
  enable: false
colorizer:
  enable: false
