# Multi-Camera Configuration for ROS2
# This file defines camera topics and settings for MultiCameraWrapper

# Base frame for TF lookups (all cameras use this as reference)
base_frame: "base_link"

# Global synchronization settings (for Layer 2 multi-camera synchronization)
# slop: Time synchronization tolerance in seconds for ApproximateTimeSynchronizer
#       - For live cameras: 0.1s (100ms) is usually sufficient
#       - For ROS bag replay: 0.2-0.5s may be needed depending on bag recording quality
#       - Larger values allow more timestamp mismatch but may match incorrect frames
# queue_size: Queue size for ApproximateTimeSynchronizer (default: 10)
# max_wait_time: Maximum wait time in seconds for sync requests to complete (default: 0.5)
# multi_camera_slop: Optional override for Layer 2 multi-camera sync slop (defaults to slop if not specified)
# multi_camera_queue_size: Optional override for Layer 2 multi-camera sync queue size (defaults to queue_size if not specified)
global_sync:
  slop: 0.2  # Increased default for bag replay compatibility
  queue_size: 10
  max_wait_time: 0.5  # Maximum wait time for sync requests (500ms)

# Camera configurations
# Each camera must have: camera_id, rgb_topic, depth_topic, camera_info_topic
# Optional parameters:
#   - base_frame: Overrides global base_frame (default: uses global base_frame)
#   - camera_frame: Camera frame name for TF lookup (optional)
#   - queue_size: Queue size for TimeSynchronizer (default: uses global queue_size)
#   - publish_rate: Publishing rate in Hz for fake camera publisher (default: 30.0)
#   - start_delay_ms: Start delay in milliseconds before first publish (default: 0.0).
#                     This allows camera B to start publishing after camera A with a delay,
#                     while both maintain fixed FPS.
# Note: slop parameter is deprecated for Layer 1 (TimeSynchronizer uses exact timestamp matching)
cameras:
  # Hand Camera (mounted on gripper)
  - camera_id: "11022812"  # Serial number or identifier
    calibration_mode: "hand" # "hand" or "third"
    rgb_topic: "/hand_camera/zed_node/rgb/image_rect_color"
    depth_topic: "/hand_camera/zed_node/depth/depth_registered"
    camera_info_topic: "/hand_camera/zed_node/rgb/camera_info"
    camera_frame: "hand_camera_left_camera_optical_frame"  # Optional: for TF lookup
    camera_base_frame: "hand_camera_camera_link"
    camera_base_parent_frame: "fr3_panda_link8"  # parent frame of camera_base_frame for calibration
    base_frame: "base_link"  # Optional: overrides global base_frame
    queue_size: 10  # Optional: queue size for TimeSynchronizer
    publish_rate: 30.0  # Optional: publishing rate in Hz for fake camera publisher
    start_delay_ms: 0.0  # Optional: start delay in ms (camera A starts immediately)
    
  # Static Camera (fixed position)
  - camera_id: "24285872"  # Serial number or identifier
    calibration_mode: "third" # "hand" or "third"
    rgb_topic: "/static_camera/zed_node/rgb/image_rect_color"
    depth_topic: "/static_camera/zed_node/depth/depth_registered"
    camera_info_topic: "/static_camera/zed_node/rgb/camera_info"
    camera_frame: "static_camera_left_camera_optical_frame"  # Optional: for TF lookup
    camera_base_frame: "static_camera_camera_link"
    camera_base_parent_frame: "base_link"   # parent frame of camera_base_frame for calibration
    base_frame: "base_link"  # Optional: overrides global base_frame
    queue_size: 10  # Optional: queue size for TimeSynchronizer
    publish_rate: 30.0  # Optional: publishing rate in Hz for fake camera publisher
    start_delay_ms: 0.0  # Optional: start delay in ms (camera B starts 10ms after camera A)   start_delay_ms: 10.0  # Optional: start delay in ms (camera B starts 10ms after camera A)

