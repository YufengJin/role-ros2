# Franka Robot Configuration File (V2)
# This file contains parameters for franka_robot_v2.launch.py
# Uses the refactored franka_robot_interface_node and franka_gripper_interface_node

# ============================================================================
# Robot Connection Settings
# ============================================================================
robot_ip: "172.17.0.2"   # Robot IP address or hostname

# Robot identification
arm_id: "fr3"  # Robot arm ID. Supported values: fer, fr3, fp3

# ============================================================================
# URDF Configuration
# ============================================================================
# Available URDF files in role_ros2/robot_ik/franka/:
#   - fr3.urdf: Base version (no fingers)
#   - fr3_w_fin.urdf: With fingers
#   - fr3_w_soft_fin.urdf: With soft fingers
urdf_file: "fr3_w_soft_fin.urdf"

# ============================================================================
# Joint Names Configuration
# ============================================================================
# IMPORTANT: Joint names must match URDF joint names exactly (with arm_id prefix)
arm_joints:
  - fr3_panda_joint1
  - fr3_panda_joint2
  - fr3_panda_joint3
  - fr3_panda_joint4
  - fr3_panda_joint5
  - fr3_panda_joint6
  - fr3_panda_joint7

gripper_joints:
  - fr3_panda_finger_joint1
  - fr3_panda_finger_joint2

# ============================================================================
# V2 Namespace Configuration
# ============================================================================
# Each node runs in its own namespace for multi-robot support

# Arm interface node namespace
arm_namespace: "fr3_arm"
# Topics: /{arm_namespace}/joint_states, /{arm_namespace}/arm_state, /{arm_namespace}/ee_pose
# Subscribers: /{arm_namespace}/joint_position_controller/command, etc.
# Services: /{arm_namespace}/reset, /{arm_namespace}/move_to_joint_positions, etc.

# Gripper interface node namespace
gripper_namespace: "fr3_gripper"
# Topics: /{gripper_namespace}/joint_states, /{gripper_namespace}/gripper_state
# Subscribers: /{gripper_namespace}/gripper/command
# Services: /{gripper_namespace}/gripper/goto, /{gripper_namespace}/gripper/grasp, etc.

# ============================================================================
# Mode Settings
# ============================================================================
# Mock mode (no real robot, for testing)
use_mock: false

# Load gripper interface
load_gripper: true

# ============================================================================
# Polymetis Server Settings (NEW in V2)
# ============================================================================
# Auto-launch robot and gripper servers before starting ROS2 nodes
# Only effective in real robot mode (use_mock: false)
auto_launch_controller: true

# Robot server port (default: 50051)
robot_port: "50051"

# Gripper server port (default: 50052)
gripper_port: "50052"

# Enable real-time control for Polymetis server
# Requires PREEMPT_RT kernel and proper permissions
use_real_time: true

# Gripper type: franka_hand or robotiq_2f
gripper_type: "franka_hand"

# For Robotiq 2F gripper (USB connection)
# robotiq_comport: "/dev/ttyUSB0"

# ============================================================================
# Publishing Settings
# ============================================================================
# State publishing rate (Hz)
publish_rate: 50.0

# Timeout threshold for state aggregator (seconds)
# If no state is received within this time, the state is considered stale
timeout_threshold: 1.0

# ============================================================================
# Controller Settings
# ============================================================================
# Default controller mode on startup
# Options: "joint_impedance", "cartesian_impedance", "joint_velocity", "none"
default_controller_mode: "joint_impedance"

# Default joint impedance gains (optional, uses Polymetis defaults if not specified)
# default_kq: [600.0, 600.0, 600.0, 600.0, 250.0, 150.0, 50.0]
# default_kqd: [50.0, 50.0, 50.0, 50.0, 30.0, 25.0, 15.0]

# Default cartesian impedance gains (optional, uses Polymetis defaults if not specified)
# default_kx: [750.0, 750.0, 750.0, 30.0, 30.0, 30.0]
# default_kxd: [75.0, 75.0, 75.0, 7.5, 7.5, 7.5]

# ============================================================================
# Reset/Home Position Settings
# ============================================================================
# Home joint positions (radians)
# Default: [0.0, -0.628, 0.0, -2.513, 0.0, 1.885, 0.0]
# This corresponds to [0, -1/5*pi, 0, -4/5*pi, 0, 3/5*pi, 0]
home_joints: [0.0, -0.628, 0.0, -2.513, 0.0, 1.885, 0.0]

# Auto-reset on startup (default: false for V2 to avoid unexpected movement)
auto_reset_on_startup: false

# Delay before auto-reset (seconds)
# Allows time for servers to fully initialize
auto_reset_delay: 5.0

# Reset movement speed (slow for safety, rad/s)
reset_velocity: 0.1

# ============================================================================
# Gripper Settings
# ============================================================================
# Default gripper speed (m/s)
default_gripper_speed: 0.05

# Default gripper force (normalized 0-1)
default_gripper_force: 0.1

# Maximum gripper width (meters, from Franka Hand spec)
max_gripper_width: 0.08

# ============================================================================
# Multi-Robot Setup Example
# ============================================================================
# For multiple robots, launch with different namespaces and ports:
#
# Robot 1:
#   ros2 launch role_ros2 franka_robot_v2.launch.py \
#       robot_ip:=192.168.1.101 \
#       arm_namespace:=robot1_arm gripper_namespace:=robot1_gripper \
#       robot_port:=50051 gripper_port:=50052
#
# Robot 2:
#   ros2 launch role_ros2 franka_robot_v2.launch.py \
#       robot_ip:=192.168.1.102 \
#       arm_namespace:=robot2_arm gripper_namespace:=robot2_gripper \
#       robot_port:=50053 gripper_port:=50054
#
# Using launch scripts directly:
#   ROBOT_IP=192.168.1.101 ROBOT_PORT=50051 ./launch_robot.sh
#   ROBOT_IP=192.168.1.101 GRIPPER_PORT=50052 ./launch_gripper.sh

# ============================================================================
# Example Usage
# ============================================================================
#
# Launch V2 nodes (with auto server launch):
#   ros2 launch role_ros2 franka_robot_v2.launch.py
#
# Launch in mock mode:
#   ros2 launch role_ros2 franka_robot_v2.launch.py use_mock:=true
#
# Launch without auto server launch (start servers manually first):
#   ros2 launch role_ros2 franka_robot_v2.launch.py auto_launch_controller:=false
#
# Custom namespaces (for multi-robot):
#   ros2 launch role_ros2 franka_robot_v2.launch.py \
#       arm_namespace:=robot1_arm gripper_namespace:=robot1_gripper
#
# Disable real-time control:
#   ros2 launch role_ros2 franka_robot_v2.launch.py use_real_time:=false
#
# Use Robotiq gripper:
#   ros2 launch role_ros2 franka_robot_v2.launch.py gripper_type:=robotiq_2f
#
# Send joint position command:
#   ros2 topic pub --once /fr3_arm/joint_position_controller/command \
#       role_ros2/msg/JointPositionCommand \
#       "{positions: [0, -0.628, 0, -2.513, 0, 1.885, 0], blocking: false}"
#
# Move to joint positions (blocking service):
#   ros2 service call /fr3_arm/move_to_joint_positions \
#       role_ros2/srv/MoveToJointPositions \
#       "{joint_positions: [0, -0.628, 0, -2.513, 0, 1.885, 0], time_to_go: 2.0}"
#
# Open gripper:
#   ros2 service call /fr3_gripper/gripper/open std_srvs/srv/Trigger
#
# Close gripper:
#   ros2 service call /fr3_gripper/gripper/close std_srvs/srv/Trigger
#
# Grasp:
#   ros2 service call /fr3_gripper/gripper/grasp \
#       role_ros2/srv/GripperGrasp "{speed: 0.1, force: 0.5, blocking: true}"
#
# ============================================================================
# V2 vs V1 Comparison
# ============================================================================
#
# V1 (polymetis_bridge_node.py):
#   - Single node handling both arm and gripper
#   - Topics: /joint_states, /robot_state
#   - Subscriber: /polymetis/robot_command (combined arm+gripper)
#
# V2 (franka_robot_interface_node.py + franka_gripper_interface_node.py):
#   - Separate nodes for arm and gripper
#   - Namespace-based topics: /{namespace}/joint_states, etc.
#   - Separate command subscribers for different control modes
#   - robot_state_aggregator_node merges states for robot_state_publisher
#   - Legacy topics published for backward compatibility
#   - Auto server launch and cleanup (like V1)
#   - Real-time control support
#   - Multi-robot support via namespaces and custom ports
#
# ============================================================================
